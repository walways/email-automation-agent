# Email Automation Agent Configuration
# QQ 邮箱配置

email:
  imap:
    host: "imap.qq.com"
    port: 993
    username: "${QQ_EMAIL_USERNAME}"  # 你的 QQ 邮箱地址，如：123456@qq.com
    password: "${QQ_EMAIL_AUTH_CODE}" # QQ 邮箱授权码（非登录密码）
    use_ssl: true
  smtp:
    host: "smtp.qq.com"
    port: 465
    username: "${QQ_EMAIL_USERNAME}"
    password: "${QQ_EMAIL_AUTH_CODE}"
    use_ssl: true
  inbox: "INBOX"
  poll_interval: 30s
  mark_as_read: true
  allowed_senders:
    - "qpf1993@foxmail.com"
    - "1249973280@qq.com"

llm:
  provider: "claude_code"  # 可选: claude_code / anthropic
  api_key: "${ANTHROPIC_AUTH_TOKEN}"  # provider=anthropic 时需要
  base_url: "${ANTHROPIC_BASE_URL}"   # provider=anthropic 时可选
  command: "claude"                   # provider=claude_code 时使用
  model: "kimi-k2.5"
  max_tokens: 4096
  timeout: 300s

executor:
  sandbox: true
  sandbox_allow_network: true  # true=允许联网（适合天气/联网查询）；false=禁网更安全
  sandbox_cpus: "2.0"          # 调试增强：容器 CPU 上限
  sandbox_memory: "2g"         # 调试增强：容器内存上限
  sandbox_pids_limit: 512      # 调试增强：进程数上限
  sandbox_tmpfs_size: "256m"   # 调试增强：/tmp 大小
  sandbox_read_only: false     # 调试增强：关闭只读根（更灵活，但安全性下降）
  timeout: 300s
  allowed_languages: ["python", "go", "bash", "javascript", "typescript"]
  work_dir: "/tmp/email-automation-sandbox"
  max_output_size: 1048576  # 1MB

logging:
  level: "info"
  file: "/tmp/email-automation-agent.log"
  max_size: 10485760  # 10MB
  max_backups: 3
