# Email Automation Agent Configuration
# QQ 邮箱配置

interaction:
  provider: "email"  # email / im
  im:
    platform: "generic"
    endpoint: "${IM_ENDPOINT}"
    bot_id: "${IM_BOT_ID}"
    bot_token: "${IM_BOT_TOKEN}"
    poll_interval: 3s

email:
  imap:
    host: "imap.qq.com"
    port: 993
    username: "${QQ_EMAIL_USERNAME}"  # 你的 QQ 邮箱地址，如：123456@qq.com
    password: "${QQ_EMAIL_AUTH_CODE}" # QQ 邮箱授权码（非登录密码）
    use_ssl: true
  smtp:
    host: "smtp.qq.com"
    port: 465
    username: "${QQ_EMAIL_USERNAME}"
    password: "${QQ_EMAIL_AUTH_CODE}"
    use_ssl: true
  inbox: "INBOX"
  poll_interval: 30s
  max_concurrent_tasks: 3   # 并发处理任务数
  use_subagent: true        # true=子代理队列模式，长任务不阻塞主轮询
  subagent_queue_size: 200  # 子代理任务队列长度
  process_latest_on_startup: false  # false=启动不处理历史邮件；true=启动先处理最新一封
  mark_as_read: true
  allowed_senders:
    - "trusted-user-1@example.com"
    - "trusted-user-2@example.com"

llm:
  provider: "${LLM_PROVIDER}"         # 可选: claude_code / codex
  command: "${LLM_COMMAND}"           # claude_code=claude, codex=codex
  model: "qwen3.5-plus"
  max_tokens: 4096
  timeout: 300s

executor:
  sandbox: true
  sandbox_allow_network: true  # true=允许联网（适合天气/联网查询）；false=禁网更安全
  timeout: 300s
  allowed_languages: ["python", "go", "bash", "javascript", "typescript"]
  work_dir: "/tmp/email-automation-sandbox"
  max_output_size: 1048576  # 1MB

logging:
  level: "info"
  file: "/tmp/email-automation-agent.log"
  max_size: 10485760  # 10MB
  max_backups: 3

cache:
  enabled: true
  ttl: 72h
  max_entries: 200
  llm_validate_on_miss: true

status_report:
  enabled: true
  interval: 1h
  recipients:
    - "ops-1@example.com"
    - "ops-2@example.com"
